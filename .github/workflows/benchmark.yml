# Cross-dataset BACE benchmark — manually triggered from the Actions tab.
#
# Sweeps the bundled real-world datasets and now shards by REPLICATE: each
# dataset is benchmarked over `n_reps` independent mask draws (different
# seeds drive both the species subsample and the masking), so the metrics
# carry error bars instead of being a single n=1 draw. The matrix is built
# dynamically in the `prepare` job, one job per {dataset, rep} -- ~20 run
# concurrently, and because each job is a single bace() run it stays under
# the 6h hosted-runner ceiling. The aggregate job stacks all reps and
# reports mean +/- SD per (dataset, trait).
#
# Trigger: Actions tab -> "Cross-dataset benchmark" -> Run workflow.
# Never auto-runs.

name: Cross-dataset benchmark

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke = 1 rep/dataset at a tiny budget+subsample (~15 min, validates pipeline); production = n_reps per dataset at full budget."
        type: choice
        options:
          - smoke
          - production
        default: smoke
      n_reps:
        description: "Replicate mask draws per dataset in production mode (error bars). 6 datasets x n_reps jobs."
        type: string
        default: "10"

jobs:
  # ---------------------------------------------------------------------
  # 1. Build the {dataset, rep} matrix. No dataset generation needed --
  #    the real datasets are bundled .rda loaded by each wrapper.
  # ---------------------------------------------------------------------
  prepare:
    name: Build matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      matrix: ${{ steps.setmatrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Build benchmark matrix
        id: setmatrix
        run: Rscript dev/_build_bench_matrix.R "${{ inputs.mode }}" "${{ inputs.n_reps }}"

  # ---------------------------------------------------------------------
  # 2. Benchmark one {dataset, rep} per job. BENCH_REP_ID makes the
  #    engine pick an independent seed (subsample + mask) per rep.
  # ---------------------------------------------------------------------
  benchmark:
    name: ${{ matrix.dataset }} rep ${{ matrix.rep }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 345  # 5h45m, under the 6h ceiling; each job is one bace() run
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      BENCH_REP_ID: ${{ matrix.rep }}
      BENCH_SMOKE: ${{ inputs.mode == 'smoke' && '1' || '0' }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Benchmark wrappers source-load BACE via devtools::load_all, so
          # devtools is added explicitly on top of the package's deps.
          extra-packages: any::devtools
          needs: ''

      - name: Run ${{ matrix.dataset }} rep ${{ matrix.rep }}
        # Shell-level stdout heartbeat: keeps the runner watchdog happy
        # during long bace_final_imp parallel-worker phases where R's
        # parent process can go quiet for many minutes.
        run: |
          (while sleep 60; do echo "[heartbeat $(date -u +%H:%M:%S)] still running ${{ matrix.dataset }} rep ${{ matrix.rep }} (mode=${{ inputs.mode }})"; done) &
          HEARTBEAT_PID=$!
          trap 'kill $HEARTBEAT_PID 2>/dev/null || true' EXIT
          Rscript ${{ matrix.script }}

      - name: Upload per-rep artifact
        if: always()  # capture partial output on failure / timeout
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.dataset }}-rep${{ matrix.rep }}
          path: dev/benchmark_results/${{ matrix.dataset }}/
          if-no-files-found: warn

  aggregate:
    name: Aggregate + report
    needs: benchmark
    if: always()  # run even if some matrix jobs failed
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Email is sent only if SMTP secrets are configured; otherwise the
    # email step skips cleanly and the run still succeeds.
    env:
      MAIL_ENABLED: ${{ secrets.MAIL_SERVER != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install report-time R packages
        run: |
          install.packages(c("knitr", "rmarkdown"), repos = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Download all per-rep artifacts
        uses: actions/download-artifact@v4
        with:
          path: dev/benchmark_results/_artifacts
          pattern: bench-*

      - name: Generate cross-dataset report
        run: Rscript dev/make_benchmark_report.R

      - name: Publish report inline to workflow summary
        run: |
          REPORT=$(find dev/benchmark_results/cross_dataset \
                        -name "report.md" -type f | sort -r | head -1)
          if [ -n "$REPORT" ] && [ -f "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ Report not generated" >> "$GITHUB_STEP_SUMMARY"
            echo "Check the matrix job logs for failures." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Locate HTML report
        id: report
        run: |
          html=$(find dev/benchmark_results/cross_dataset \
                      -name report.html -type f | sort -r | head -1)
          echo "html=$html" >> "$GITHUB_OUTPUT"
          echo "Report HTML: ${html:-<none>}"

      - name: Email HTML report
        # Skips unless SMTP secrets are set; never fails the run.
        if: ${{ env.MAIL_ENABLED == 'true' && steps.report.outputs.html != '' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "BACE cross-dataset benchmark — run ${{ github.run_number }} (${{ inputs.mode }})"
          to: ${{ secrets.MAIL_TO }}
          from: BACE Benchmarks <${{ secrets.MAIL_USERNAME }}>
          html_body: file://${{ steps.report.outputs.html }}
          attachments: ${{ steps.report.outputs.html }}

      - name: Upload cross-dataset summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-dataset-summary
          path: dev/benchmark_results/cross_dataset/
          if-no-files-found: warn
