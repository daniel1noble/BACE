# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

name: test-coverage

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # xml2 is needed by covr::to_cobertura() to emit the
          # Cobertura XML the coverallsapp action consumes.
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Compute coverage and export Cobertura XML
        # covr::coveralls() against coveralls.io was returning 422
        # "Couldn't find a repository matching this job" even with a
        # valid COVERALLS_REPO_TOKEN -- a known gotcha with covr's
        # direct upload path. Switched to the official coverallsapp
        # action below, which uses GitHub-Apps auth on public repos
        # (no secret required) and accepts a Cobertura XML file.
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          print(cov)
          covr::to_cobertura(cov, filename = "coverage.xml")
        shell: Rscript {0}

      - name: Upload to coveralls.io
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.xml
          format: cobertura

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
